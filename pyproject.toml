[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["custom_components", "tests"]

[tool.ruff.lint]
select = [
  "E",
  "F",
]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
