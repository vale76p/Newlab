name: Validate

on:
  push:
  pull_request:

jobs:
  lint_and_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff aiohttp

      - name: Ruff
        run: ruff check .

      - name: Pytest with Coverage
        run: |
          pytest -q \
            --cov=custom_components/newlab \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov | tee coverage.txt

      - name: Coverage Summary
        shell: bash
        run: |
          COVERAGE_PCT="$(awk '/^TOTAL/ {print $NF}' coverage.txt)"
          echo "### Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total coverage: **${COVERAGE_PCT}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: \`coverage.xml\` + \`htmlcov/\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  integration_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_integration.txt

      - name: Run integration tests
        run: pytest integration_tests/ -v

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
