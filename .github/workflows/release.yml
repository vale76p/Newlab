name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag vs manifest version
        id: validate
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.0
          VERSION="${TAG#v}"                # strip leading 'v'
          MANIFEST_VERSION="$(python3 -c "
          import json, pathlib
          m = json.loads(pathlib.Path('custom_components/newlab/manifest.json').read_text())
          print(m['version'])
          ")"

          echo "tag_version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi
          echo "Version $VERSION matches manifest — OK"

      - name: Extract changelog entry
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.validate.outputs.tag_version }}"

          # Extract content between ## [VERSION] and the next ## heading
          BODY="$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md \
            | grep -v "^## \[" | sed '/^[[:space:]]*$/d;/^---$/d' | head -80)"

          if [ -z "$BODY" ]; then
            echo "::error::No CHANGELOG.md entry found for version $VERSION"
            exit 1
          fi

          echo "changelog_body<<EOF_DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$BODY"                         >> "$GITHUB_OUTPUT"
          echo "EOF_DELIMITER"                 >> "$GITHUB_OUTPUT"
          echo "Found changelog entry for $VERSION"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag  = context.ref.replace('refs/tags/', '');
            const body = `${{ steps.changelog.outputs.changelog_body }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: tag,
              body: body,
              draft: false,
              prerelease: false,
            });
            core.info(`Release ${tag} created`);
